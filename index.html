<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke TikTok</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>
    
    <div class="login-container">
        <!-- SVG TikTok Logo for a touch of authenticity -->
        <div class="logo-container">
            <svg class="tiktok-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                <path d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,162.55,186.83V280.6A70.09,70.09,0,1,0,250,349.38V0h88.89A142.34,142.34,0,0,0,448,87.16Z"/>
            </svg>
        </div>
        <h1>MASUK KE TIKTOK</h1>
        <hr class="separator">
        
        <form>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Username atau email" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Kata sandi" required>
            </div>
            
            <div class="options">
                <label class="remember">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Remember me
                </label>
                <a href="#" class="forgot">Forgot Password?</a>
            </div>
            
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
    </div>

    <!-- Peringatan Keamanan -->
    <div class="security-warning">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <p><strong>Peringatan Keamanan:</strong> Halaman ini adalah simulasi edukasi keamanan cyber, perhatikan url sebelum memasukan data sensitive</p>
    </div>
</body>
</html>
